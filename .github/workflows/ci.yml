name: CI

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Linting
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Run black
        uses: psf/black@stable
        with:
          # > Please note that the --check flag is required so that the
          # > workflow fails if Black finds files that need to be formatted.
          options: --check --verbose --skip-string-normalization

  test:
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14', 3.x]
    runs-on: ubuntu-latest
    name: 'Python ${{ matrix.python-version }}'
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: 1
      PIP_NO_PYTHON_VERSION_WARNING: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ matrix.python-version }}'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: ./scripts/plot_all.sh
      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: 'out-${{ matrix.python-version }}'
          path: ./out/
          if-no-files-found: error
